name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e .
      - name: Verify imports
        run: |
          python -c "import gmail_calendar_mcp; print('gmail_calendar_mcp: OK')"
          python -c "import easter_egg.drive_mcp; print('drive_mcp: OK')" 2>/dev/null || echo "drive_mcp: skipped (hyphen dir)"
      - name: Syntax check
        run: |
          python -m py_compile gmail_calendar_mcp.py
          python -m py_compile easter-egg/drive_mcp.py
          echo "Syntax: OK"
